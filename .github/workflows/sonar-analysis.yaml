# =============================================================================
# 📊 SonarCloud Coverage
# Runs code analysis and coverage reporting using SonarCloud.
# Inputs:
#   - sonar_token: Required SonarCloud token
#   - project_key: SonarCloud project key
#   - organization: SonarCloud organization
# =============================================================================

name: SonarCloud Coverage

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
    inputs:
      runner:
        description: 'Choose the runner'
        required: false
        default: 'ubuntu-latest'
        type: string

jobs:
  testing:
    name: Run Sonar Cloud Coverage
    runs-on: ${{ inputs.runner }}
    container: 'node:22.14'
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Get GitHub App Token
        id: get_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PPC_CI_APP_ID }}
          private-key: ${{ secrets.PPC_CI_APP_PRIVATE_KEY }}

      - name: 🛫 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: 🔧 Setup Node and NPM
        uses: stetind/ppc-github-composite-actions/.github/actions/install-global-dependencies@v1.1.0
        with:
          npm_token: $NPM_TOKEN

      - name: 🔧 Building Environment
        run: npm run build --if-present && npx browserslist@latest --update-db

      - name: 🔧 Run Tests
        id: run_test
        run: npm run test:ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN  }}
