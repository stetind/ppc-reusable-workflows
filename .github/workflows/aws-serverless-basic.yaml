# =============================================================================
# 🚀 AWS Serverless Deploy
# Deploys a Serverless Framework project using AWS credentials and environment configuration.
# Inputs:
#   - stage: Target stage (e.g. dev, prod)
#   - region: AWS region
#   - folder: Directory of the service (default is current directory)
#   - environment: Optional .env file to load environment variables
# =============================================================================

name: AWS_Serverless_Deploy

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      SERVERLESS_ACCESS_KEY:
        required: true
      PPC_CI_APP_ID:
        required: true
      PPC_CI_APP_PRIVATE_KEY:
        required: true
    inputs:
      deploy_environment:
        description: 'Choose an environment'
        required: true
        default: "staging"
        type: string
      region:
        description: 'Choose the region you want to deploy'
        required: false
        default: 'us-east-1'
        type: string
      force:
        description: 'Execute force deployment, even if no changes exist'
        required: false
        default: 'false'
        type: string
      debug:
        description: 'Enable debug?'
        required: false
        default: false
        type: boolean
      runner:
        description: 'Choose the runner'
        required: false
        default: 'ubuntu-latest'
        type: string
      job_container:
        description: 'Select the docker container for the action'
        required: false
        default: 'node:22.14'
        type: string
      aws_account:
        required: false
        default: ''
        type: string
      aws_github_role:
        required: false
        default: ''
        type: string

env:
  AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1,
  AWS_SDK_LOAD_CONFIG: 1
  debugMode: ${{ inputs.debug }}

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    name: Deploy
    environment: ${{ inputs.deploy_environment }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      PPC_STAGE: ${{ vars.PPC_STAGE || vars.PPCENV_PPC_STAGE }}
      REGION: ${{ inputs.region || vars.PPCENV_REGION }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      ACCOUNT_ID: ${{ inputs.aws_account || vars.AWS_ACCOUNT_ID }}
      GITHUB_ROLE_NAME: ${{ inputs.aws_github_role || vars.AWS_GITHUB_ROLE_NAME}}

    container:
      image: ${{ inputs.job_container }}
      volumes:
        - ${{ github.workspace }}:/workspace
    steps:
      - name: Get GitHub App Token
        id: get_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PPC_CI_APP_ID }}
          private-key: ${{ secrets.PPC_CI_APP_PRIVATE_KEY }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use the App's identity to assume the role
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.GITHUB_ROLE_NAME }}
          aws-region: ${{ env.REGION }}
          web-identity-token-file: ${{ steps.get_token.outputs.token }}

      - name: 🛫 Checkout
        uses: actions/checkout@v6

      - name: 🧙 Install Node
        uses: stetind/ppc-github-composite-actions/.github/actions/install-global-dependencies@v1.0.7
        with:
          npm_token: $NPM_TOKEN

      - name: 📓 Create [dot] env
        uses: stetind/ppc-github-composite-actions/.github/actions/create-dot-env@v1.0.7
        with:
          volume: '/workspace'
          secrets: ${{ toJSON(secrets) }}
          variables: ${{ toJSON(vars) }}

      - name: 🚅 Deploy to AWS (Force)
        if: ${{ inputs.force == 'true' }}
        run: PPC_STAGE=$PPC_STAGE npm run sls-deploy --force

      - name: 🚅 Deploy to AWS
        if: ${{ inputs.force != 'true' }}
        run: PPC_STAGE=$PPC_STAGE npm run sls-deploy
