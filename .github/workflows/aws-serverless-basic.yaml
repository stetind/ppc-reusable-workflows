# =============================================================================
# 🚀 AWS Serverless Deploy
# Deploys a Serverless Framework project using AWS credentials and environment configuration.
# Inputs:
#   - stage: Target stage (e.g. dev, prod)
#   - region: AWS region
#   - folder: Directory of the service (default is current directory)
#   - environment: Optional .env file to load environment variables
# =============================================================================

name: AWS_Serverless_Deploy

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      PPC_CI_APP_ID:
        required: true
      PPC_CI_APP_PRIVATE_KEY:
        required: true
    inputs:
      deploy_environment:
        description: 'Choose an environment'
        required: true
        default: "staging"
        type: string
      region:
        description: 'Choose the region you want to deploy'
        required: false
        default: 'us-east-1'
        type: string
      force:
        description: 'Execute force deployment, even if no changes exist'
        required: false
        default: 'false'
        type: string
      debug:
        description: 'Enable debug?'
        required: false
        default: false
        type: boolean

env:
  AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1,
  AWS_SDK_LOAD_CONFIG: 1
  debugMode: ${{ inputs.debug }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    environment: ${{ inputs.deploy_environment }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      PPC_STAGE: ${{ vars.PPC_STAGE || vars.PPCENV_PPC_STAGE }}
      REGION: ${{ inputs.region || vars.PPCENV_REGION }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      GITHUB_ROLE_NAME: ${{ vars.AWS_GITHUB_ROLE_NAME}}

    steps:
      - name: Get GitHub App Token
        id: get_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PPC_CI_APP_ID }}
          private-key: ${{ secrets.PPC_CI_APP_PRIVATE_KEY }}

      - name: 🛫 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🟢 Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: 🧙 Install Node
        uses: stetind/ppc-github-composite-actions/.github/actions/install-global-dependencies@v1.1.0
        with:
          npm_token: $NPM_TOKEN

      - name: 📓 Create [dot] env
        uses: stetind/ppc-github-composite-actions/.github/actions/create-dot-env@v1.1.0
        with:
          volume: ${{ github.workspace }}
          secrets: ${{ toJSON(secrets) }}
          variables: ${{ toJSON(vars) }}

      - name: 🔐 AWS OIDC Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use the App's identity to assume the role
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.GITHUB_ROLE_NAME }}
          aws-region: ${{ env.REGION }}
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: 🚅 Deploy to AWS
        shell: bash
        run: |
          # No manual token hunting! AWS credentials are already in the environment.
          FORCE_FLAG=$([[ "${{ inputs.force }}" == "true" ]] && echo "--force" || echo "")

          echo "🚀 Deploying to $PPC_STAGE in $REGION"
          npm run sls-deploy -- --stage $PPC_STAGE --region $REGION $FORCE_FLAG