# =============================================================================
# ✅ Serverless Validate
#
# This workflow validates a Serverless Framework configuration:
# - Ensures the serverless.yml file is valid
# - Verifies configuration for specified stage and region
# - Validates AWS credentials and permissions
#
# Inputs:
#   - deploy_environment: Environment to validate (default: staging)
#   - region: AWS region (default: us-east-1) 
#   - runner: GitHub runner to use (default: self-hosted)
#   - job_container: Docker container image (default: node:22.14)
#
# Required Secrets:
#   - NPM_TOKEN
#   - SERVERLESS_ACCESS_KEY
#   - PPC_CI_APP_ID
#   - PPC_CI_APP_PRIVATE_KEY
#
# Trigger: workflow_call
# =============================================================================

name: AWS_Serverless_Validate

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      SERVERLESS_ACCESS_KEY:
        required: true
      PPC_CI_APP_ID:
        required: true
      PPC_CI_APP_PRIVATE_KEY:
        required: true
    inputs:
      deploy_environment:
        description: 'Choose an environment:'
        required: true
        default: "staging"
        type: string
      region:
        description: 'Choose a region:'
        required: false
        default: 'us-east-1'
        type: string
      runner:
        description: 'Choose the runner'
        required: false
        default: 'ubuntu-latest'
        type: string

env:
  AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1,
  AWS_SDK_LOAD_CONFIG: 1
  debugMode: 'false'

jobs:
  validate_serverless:
    name: Validate Serverless
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
      PPC_STAGE: ${{ vars.PPC_STAGE || vars.PPCENV_PPC_STAGE }}
      REGION: ${{ inputs.region || vars.PPCENV_REGION }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      ACCOUNT_ID: ${{ inputs.aws_account || vars.AWS_ACCOUNT_ID }}
      GITHUB_ROLE_NAME: ${{ inputs.aws_github_role || vars.AWS_GITHUB_ROLE_NAME}}

    steps:
      - name: 🛫 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'


      - name: 🧙 Install Node
        uses: stetind/ppc-github-composite-actions/.github/actions/install-global-dependencies@v1.0.7
        with:
          npm_token: $NPM_TOKEN

      - name: 📓 Create [dot] env
        uses: stetind/ppc-github-composite-actions/.github/actions/create-dot-env@v1.0.7
        with:
          volume: '/workspace'
          secrets: ${{ toJSON(secrets) }}
          variables: ${{ toJSON(vars) }}

      - name: 🔐 AWS OIDC Credentials
        uses: stetind/ppc-github-composite-actions/.github/actions/aws-oidc@v1.1.0
        with:
          app_id: ${{ secrets.PPC_CI_APP_ID }}
          app_private_key: ${{ secrets.PPC_CI_APP_PRIVATE_KEY }}
          account_id: ${{ env.ACCOUNT_ID }}
          github_role_name: ${{ env.GITHUB_ROLE_NAME }}
          region: ${{ env.REGION }}

      - name: 🚅 Serverless Validate
        run: npm run sls-print